name: Publish npm

on:
  push:
    branches: [main]
    paths:
      - package.json
      - package-lock.json
      - .github/workflows/publish-npm.yml

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    name: Publish with provenance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          # No registry-url: setup-node@v6 injects GITHUB_TOKEN as NODE_AUTH_TOKEN
          # which npm rejects (it's not an npm token). Configure the registry
          # manually instead so OIDC trusted publisher can take over.

      - id: package
        name: Read package metadata
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - id: published
        name: Check npm version
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} is already published; skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - run: npm ci
        if: steps.published.outputs.exists == 'false'

      - run: npm run build
        if: steps.published.outputs.exists == 'false'

      - run: npm pack --dry-run
        if: steps.published.outputs.exists == 'false'

      - name: Upgrade npm and configure registry for OIDC publishing
        if: steps.published.outputs.exists == 'false'
        run: |
          # npm 10.9.7 (bundled with Node 22) throws ENEEDAUTH before the OIDC
          # exchange can run. npm 11 fixed this. Upgrade then write a clean
          # .npmrc (registry only, no _authToken) so the OIDC exchange fires.
          npm install -g npm@latest
          echo "registry=https://registry.npmjs.org/" > /tmp/npm-oidc.npmrc
          npm --version

      - run: npm publish --access public --provenance
        if: steps.published.outputs.exists == 'false'
        env:
          NPM_CONFIG_USERCONFIG: /tmp/npm-oidc.npmrc

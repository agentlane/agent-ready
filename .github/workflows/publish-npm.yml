name: Publish npm

on:
  push:
    branches: [main]
    paths:
      - package.json
      - package-lock.json
      - .github/workflows/publish-npm.yml

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    name: Publish with provenance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          # No registry-url: setup-node@v6 injects GITHUB_TOKEN as NODE_AUTH_TOKEN
          # which npm rejects (it's not an npm token). Configure the registry
          # manually instead so OIDC trusted publisher can take over.

      - id: package
        name: Read package metadata
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - id: published
        name: Check npm version
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} is already published; skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - run: npm ci
        if: steps.published.outputs.exists == 'false'

      - run: npm run build
        if: steps.published.outputs.exists == 'false'

      - run: npm pack --dry-run
        if: steps.published.outputs.exists == 'false'

      - name: Debug OIDC + npm config
        if: steps.published.outputs.exists == 'false'
        run: |
          echo "=== OIDC env vars ==="
          echo "GITHUB_ACTIONS=${GITHUB_ACTIONS}"
          echo "ACTIONS_ID_TOKEN_REQUEST_URL=${ACTIONS_ID_TOKEN_REQUEST_URL:-NOT SET}"
          echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN set: $([[ -n "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" ]] && echo YES || echo NO)"
          echo "NODE_AUTH_TOKEN set: $([[ -n "$NODE_AUTH_TOKEN" ]] && echo YES || echo NO)"
          echo "=== npm config (clean npmrc) ==="
          echo "registry=https://registry.npmjs.org/" > /tmp/npm-oidc.npmrc
          NPM_CONFIG_USERCONFIG=/tmp/npm-oidc.npmrc npm config list
          echo "=== npm whoami ==="
          NPM_CONFIG_USERCONFIG=/tmp/npm-oidc.npmrc npm whoami --loglevel=verbose 2>&1 || true

      - run: npm publish --access public --provenance --loglevel=verbose
        if: steps.published.outputs.exists == 'false'
        env:
          NPM_CONFIG_USERCONFIG: /tmp/npm-oidc.npmrc

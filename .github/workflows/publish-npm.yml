name: Publish npm

on:
  push:
    branches: [main]
    paths:
      - package.json
      - package-lock.json
      - .github/workflows/publish-npm.yml

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    name: Publish with provenance
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          # No registry-url — setup-node's .npmrc injection interferes with
          # npm's OIDC token exchange for trusted publishers. npm defaults to
          # registry.npmjs.org and will use the GitHub OIDC token automatically
          # when ACTIONS_ID_TOKEN_REQUEST_URL is present (id-token: write).

      - id: package
        name: Read package metadata
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - id: published
        name: Check npm version
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} is already published; skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - run: npm ci
        if: steps.published.outputs.exists == 'false'

      - run: npm run build
        if: steps.published.outputs.exists == 'false'

      - run: npm pack --dry-run
        if: steps.published.outputs.exists == 'false'

      - run: npm publish --access public --provenance
        if: steps.published.outputs.exists == 'false'

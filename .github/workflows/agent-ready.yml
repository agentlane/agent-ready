# Reference workflow — copy this into a consuming repo at .github/workflows/agent-ready.yml.
# It is manual-only in this repo so ordinary project issues do not self-lint.

name: Agent-Ready Check
on:
  workflow_dispatch:
    inputs:
      issue-number:
        description: "Issue number to check"
        required: true

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          issue-number: ${{ inputs.issue-number }}
          comment-on-issue: true
          fail-on-not-ready: true
          github-token: ${{ github.token }}

# agent-ready default rule pack
# Loaded automatically when no --rules flag is passed.
# Override per-rule by writing your own .agent-ready/rules.yaml with `extends: default`.

version: 1

signals:
  risk_classification:
    default: medium
    label_prefix: "risk:"

  path_recommendation:
    default: A
    warning_threshold: 2
    ui_value: B
    warning_value: B
    fail_value: C
    high_risk_value: C

  context_tier:
    default: T1
    body_length_t2: 800
    body_length_t3: 2000
    ui_value: T2
    warning_value: T2
    fail_value: T2
    high_risk_value: T3

rules:
  has-acceptance-criteria:
    enabled: true
    min_count: 1
    severity: error

  has-definition-of-done:
    enabled: true
    severity: warn

  has-repo-target:
    enabled: true
    severity: error

  has-risk-classification:
    enabled: true
    severity: error

  has-test-expectations:
    enabled: true
    severity: warn

  no-ambiguous-verbs:
    enabled: true
    severity: warn
    extra_terms: []

  body-min-length:
    enabled: true
    min_count: 100
    severity: error

  no-tribal-knowledge:
    enabled: true
    severity: warn

  t-shirt-size-present:
    enabled: true
    severity: warn

  has-design-link:
    enabled: true
    severity: warn
    labels: [ui, ux, frontend]

  restricted-paths-declared:
    enabled: true
    severity: warn
    # keywords: []   # extend the default restricted keyword list
    # paths: []      # extend the default restricted path list

  links-resolve:
    enabled: false   # opt-in — disable for offline/air-gapped CI
    severity: warn
    # timeout_ms: 5000
    # skip_domains: [localhost, example.com]

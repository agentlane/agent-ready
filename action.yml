name: Agent Ready Gate
description: Lint GitHub Issues for AI-agent readiness before Copilot, Cursor, Claude Code, or Codex starts work.
author: Shoaib
branding:
  icon: check-circle
  color: green

inputs:
  issue-number:
    description: "Issue number to check. Defaults to the triggering issue."
    required: false
  rules:
    description: "Path (in the repo) to a custom rule pack YAML. Defaults to the built-in 'default' pack."
    required: false
    default: ""
  comment-on-issue:
    description: "Post the result as a comment on the issue."
    required: false
    default: "true"
  fail-on-not-ready:
    description: "Exit non-zero when the issue is not ready. Use with required-status-checks."
    required: false
    default: "true"
  github-token:
    description: "Token used to fetch and comment on GitHub Issues."
    required: false
  set-label:
    description: "Add the `agent-ready` label when ready, remove it when not. Label is created automatically if it does not exist in the repo."
    required: false
    default: "true"

outputs:
  ready:
    description: "'true' or 'false' — whether the ticket passed."
  failed-count:
    description: "Number of error-severity rules that failed."
  warnings-count:
    description: "Number of warn-severity rules that failed."

runs:
  using: docker
  image: Dockerfile
